<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VIBENetBackup</title>
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow" style="width:100%;max-width:400px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <i class="bi bi-hdd-network fs-1 text-primary"></i>
            <h4 class="mt-2 mb-0">VIBENetBackup</h4>
            <div class="text-muted small">Network Backup Manager</div>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" autocomplete="current-password" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember" value="1" checked>
                <label class="form-check-label" for="remember">Remember me for 14 days</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
    </div>
    <div class="card-footer text-center text-muted small py-2">
        VIBENetBackup
    </div>
</div>
<script src="/static/vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
