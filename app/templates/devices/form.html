{% extends "base.html" %}
{% block title %}{{ 'Edit' if device else 'Add' }} Device - VIBENetBackup{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const deviceType = document.querySelector('select[name="device_type"]');
    const engine = document.querySelector('select[name="backup_engine"]');
    const portInput = document.getElementById('port-input');
    const portLabel = document.getElementById('port-label');

    const enginePorts = { netmiko: 22, scp: 22, oxidized: 8888, pfsense: 443 };
    const firewallTypes = ['pfsense', 'opnsense'];

    let userChangedPort = {{ 'true' if device else 'false' }};
    portInput.addEventListener('input', function() { userChangedPort = true; });

    function updatePortHint() {
        const eng = engine.value;
        const defaultPort = enginePorts[eng] || 22;
        portLabel.textContent = (eng === 'pfsense') ? 'Web Port' : 'SSH Port';
        if (!userChangedPort) {
            portInput.value = defaultPort;
        }
        portInput.placeholder = defaultPort;
    }

    deviceType.addEventListener('change', function() {
        const dt = this.value.toLowerCase();
        if (firewallTypes.includes(dt)) {
            engine.value = 'pfsense';
        } else if (engine.value === 'pfsense') {
            engine.value = 'netmiko';
        }
        userChangedPort = false;
        updatePortHint();
    });

    engine.addEventListener('change', function() {
        userChangedPort = false;
        updatePortHint();
    });

    // Set initial label without changing port value
    portLabel.textContent = (engine.value === 'pfsense') ? 'Web Port' : 'SSH Port';
});
</script>
{% endblock %}

{% block content %}
<h2><i class="bi bi-router"></i> {{ 'Edit' if device else 'Add' }} Device</h2>

<div class="card mt-3">
    <div class="card-body">
        <form method="post" action="{{ '/devices/' ~ device.id ~ '/edit' if device else '/devices/add' }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Hostname</label>
                    <input type="text" name="hostname" class="form-control" value="{{ device.hostname if device else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">IP Address</label>
                    <input type="text" name="ip_address" class="form-control" value="{{ device.ip_address if device else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Device Type</label>
                    <select name="device_type" class="form-select">
                        {% for key, label in device_types.items() %}
                        <option value="{{ key }}" {{ 'selected' if device and device.device_type == key else '' }}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Backup Engine</label>
                    <select name="backup_engine" class="form-select">
                        {% for key, label in engine_types.items() %}
                        <option value="{{ key }}" {{ 'selected' if device and device.backup_engine == key else '' }}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Credential</label>
                    <select name="credential_id" class="form-select">
                        <option value="">-- None --</option>
                        {% for c in credentials %}
                        <option value="{{ c.id }}" {{ 'selected' if device and device.credential_id == c.id else '' }}>{{ c.name }} ({{ c.username }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Group</label>
                    <input type="text" name="group" class="form-control" value="{{ device.group if device else 'default' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label" id="port-label">Port</label>
                    <input type="number" name="port" id="port-input" class="form-control" value="{{ device.port if device else 22 }}"
                           placeholder="22 for SSH, 443 for API">
                </div>
                {% if device %}
                <div class="col-md-4">
                    <label class="form-label">Enabled</label>
                    <select name="enabled" class="form-select">
                        <option value="true" {{ 'selected' if device.enabled else '' }}>Yes</option>
                        <option value="false" {{ 'selected' if not device.enabled else '' }}>No</option>
                    </select>
                </div>
                {% endif %}
                <div class="col-12">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2">{{ device.notes if device and device.notes else '' }}</textarea>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ 'Save Changes' if device else 'Add Device' }}</button>
                <a href="{{ '/devices/' ~ device.id if device else '/devices' }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
