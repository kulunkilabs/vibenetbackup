<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VIBENetBackup{% endblock %}</title>
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-hdd-network"></i> VIBENetBackup
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/devices"><i class="bi bi-router"></i> Devices</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/backups"><i class="bi bi-archive"></i> Backups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jobs"><i class="bi bi-clock-history"></i> Schedules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jobs/history"><i class="bi bi-journal-text"></i> Job History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/destinations"><i class="bi bi-folder2-open"></i> Destinations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/credentials"><i class="bi bi-key"></i> Credentials</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/groups"><i class="bi bi-collection"></i> Groups</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/notifications"><i class="bi bi-bell"></i> Notifications</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/kulunkilabs/vibenetbackup" target="_blank" rel="noopener" title="GitHub">
                            <i class="bi bi-github fs-5"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://ko-fi.com/kulunkilabs" target="_blank" rel="noopener" title="Buy me a coffee">
                            <i class="bi bi-cup-hot-fill fs-5"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning" href="/logout" title="Sign out">
                            <i class="bi bi-box-arrow-right fs-5"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3" style="min-height: calc(100vh - 200px);">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark border-top mt-5 py-3">
        <div class="container-fluid text-center text-secondary">
            <div class="mb-2">
                <span class="fw-semibold">VIBENetBackup</span>
                <span class="mx-2">|</span>
                <a href="https://github.com/kulunkilabs/vibenetbackup" target="_blank" rel="noopener" class="text-secondary text-decoration-none">
                    <i class="bi bi-github"></i>
                </a>
                <span class="mx-2">|</span>
                <small class="text-muted">{{ app_version }}</small>
            </div>
        </div>
    </footer>

    <script src="/static/vendor/bootstrap.bundle.min.js"></script>
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
